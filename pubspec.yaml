name: nodus
description: A multiplatform application compiler for Flutter that generates typed state, persistence, offline sync, backend security, routes, and tests from one graph.
version: 0.1.0
repository: https://github.com/sidux/nodus
issue_tracker: https://github.com/sidux/nodus/issues

topics:
  - flutter
  - local-first
  - code-generation
  - offline-first
  - supabase

platforms:
  android:
  ios:
  linux:
  macos:
  windows:

executables:
  nodus:

environment:
  sdk: ^3.10.0

dependencies:
  analyzer: '>=12.0.0 <14.0.0'
  build: ^4.0.7
  build_runner: ^2.15.1
  crypto: ^3.0.7
  dart_style: '>=3.1.8 <4.0.0'
  drift: ^2.34.0
  drift_dev: ^2.34.0
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  glob: ^2.1.3
  go_router: ^17.3.0
  mobx: ^2.6.0
  path: ^1.9.1
  path_provider: ^2.1.6
  source_gen: ^4.2.3
  supabase: ^2.14.0
  uuid: ^4.6.0

dev_dependencies:
  build_test: ^3.5.16
  flutter_test:
    sdk: flutter
  http: ^1.6.0
  lints: ^6.1.0
  test: ^1.31.0
