name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      # The nested Flutter application owns a separate package config and job.
      - run: flutter analyze lib test bin
      - run: dart test --exclude-tags flutter
      - run: flutter test --tags flutter
      - run: dart doc --validate-links
      - run: dart pub publish --dry-run

  example:
    name: Tasks example
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: example/tasks
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run nodus check
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test
